body{min-height:100vh;background:linear-gradient(135deg,#0f0420 0%,#1a0533 30%,#12023a 60%,#0a0f2e 100%);font-family:'Cairo',sans-serif;direction:rtl;color:#f3e8ff;padding:24px 16px 48px;overflow-x:hidden}

h1{font-size:28px;font-weight:900;text-align:center;margin-bottom:6px}

.header-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}

.lesson-detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:16px}
.lesson-cell{background:rgba(255,255,255,.03);border-radius:10px;padding:10px 12px;border:1px solid rgba(168,85,247,.1)}

/* score circle */
.score-circle{width:110px;height:110px;border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;margin:0 auto 20px;position:relative;font-weight:900}
.score-circle svg{position:absolute;inset:0;transform:rotate(-90deg)}
.score-num{font-size:26px;line-height:1;position:relative;z-index:1}
.score-label{font-size:11px;color:rgba(216,180,254,.6);position:relative;z-index:1;margin-top:2px}
/* page transition */
.page-enter{animation:pageIn .35s cubic-bezier(.4,0,.2,1) both}
@keyframes pageIn{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
/* filter row */
.filter-row{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px}
.filter-btn{padding:6px 14px;border-radius:20px;cursor:pointer;font-weight:600;font-size:12px;border:1px solid rgba(168,85,247,.25);background:rgba(255,255,255,.05);color:rgba(216,180,254,.6);font-family:'Cairo',sans-serif;transition:all .15s}
.filter-btn.active{background:rgba(147,51,234,.35);color:#f3e8ff;border-color:rgba(147,51,234,.5)}
@media(max-width:480px){
  .subject-grid{grid-template-columns:1fr}
  .row{flex-direction:column}
  .lesson-detail-grid{grid-template-columns:1fr}
  .admin-tabs{flex-direction:column}
}
</style>
</head>

// نقاط الفهم: ممتاز=100، متوسط=50، ضعيف=0
function calcScore(ratings){
  const vals = Object.values(ratings||{});
  if(!vals.length) return 0;
  const total = vals.reduce((s,r)=> s+(r==='ممتاز'?100:r==='متوسط'?50:0),0);
  return Math.round(total/vals.length);
}

function scoreColor(s){ return s>=75?'#22c55e':s>=50?'#f59e0b':s>=25?'#f97316':'#ef4444'; }
function scoreEmoji(s){ return s>=75?'🌟':s>=50?'👍':s>=25?'📈':'💪'; }
function scoreMsg(s){ return s>=75?'ممتاز! أداؤك رائع':s>=50?'جيد! يمكنك التحسين':s>=25?'تحتاج مراجعة أكثر':'راجع المادة بشكل أعمق'; }

// حفظ المواد التي صوّت عليها محلياً
function getVotedSubjects(){ try{ return JSON.parse(localStorage.getItem('voted_'+S.name)||'[]'); }catch{return[];} }
function markVoted(subj){ const v=getVotedSubjects(); if(!v.includes(subj)){v.push(subj);localStorage.setItem('voted_'+S.name,JSON.stringify(v));} }
function hasVoted(subj){ return getVotedSubjects().includes(subj); }

function render(anim=true){
  destroyCharts();
  const app=document.getElementById('app');
  const map={intro:renderIntro,subjects:renderSubjects,survey:renderSurvey,done:renderDone,admin:renderAdmin};
  app.innerHTML=`<div class="${anim?'page-enter':''}">${map[S.step]()}</div>`;
  const bind={intro:bindIntro,subjects:bindSubjects,survey:bindSurvey,done:bindDone,admin:bindAdmin};
  bind[S.step]();
}
function destroyCharts(){ Object.values(charts).forEach(c=>{try{c.destroy()}catch{}}); charts={}; }

  return `

      <div style="font-size:52px;margin-bottom:10px">📊</div>

      <div class="row">

      </div>
      <label class="label">الشعبة</label>
      <div class="row" style="margin-bottom:28px">
        <button class="choice-btn ${S.section==='الشعبة الأولى'?'active':''}" data-sec="الشعبة الأولى">الشعبة الأولى</button>
        <button class="choice-btn ${S.section==='الشعبة الثانية'?'active':''}" data-sec="الشعبة الثانية">الشعبة الثانية</button>

    </div>
  </div>
  <div id="adminModal" style="display:none" class="modal-overlay">

function bindIntro(){
  const ni=document.getElementById('nameInput');
  ni.addEventListener('input',()=>{S.name=ni.value;updateStartBtn();});
  document.querySelectorAll('[data-gender]').forEach(btn=>{
    btn.addEventListener('click',()=>{S.gender=btn.dataset.gender;document.querySelectorAll('[data-gender]').forEach(b=>b.classList.toggle('active',b===btn));updateStartBtn();});
  });
  document.querySelectorAll('[data-sec]').forEach(btn=>{
    btn.addEventListener('click',()=>{S.section=btn.dataset.sec;document.querySelectorAll('[data-sec]').forEach(b=>b.classList.toggle('active',b===btn));updateStartBtn();});
  });
  document.getElementById('startBtn').addEventListener('click',()=>{
    const n=ni.value.trim(); if(!n){ni.focus();return;} S.name=n;
    if(!S.gender||!S.section)return; S.step='subjects'; render();
  });
  document.getElementById('adminBtn').addEventListener('click',()=>{document.getElementById('adminModal').style.display='flex';setTimeout(()=>document.getElementById('pwInput').focus(),50);});
  document.getElementById('closeModalBtn').addEventListener('click',closeModal);
  document.getElementById('adminModal').addEventListener('click',e=>{if(e.target===e.currentTarget)closeModal();});
  document.getElementById('loginBtn').addEventListener('click',doLogin);

  const items=lessons.map((lesson,i)=>{

    return `

      </p>
      <div class="rating-row">
        <button class="rating-btn excellent ${r==='ممتاز'?'active':''}" data-lesson="${escAttr(lesson)}" data-rating="ممتاز">✨ ممتاز</button>
        <button class="rating-btn medium ${r==='متوسط'?'active':''}" data-lesson="${escAttr(lesson)}" data-rating="متوسط">📊 متوسط</button>

  return `
  <div class="container">
    <button class="back-btn" id="backBtn">← رجوع</button>

      <h2 style="color:#f3e8ff;font-weight:800;font-size:22px">${SUBJECTS[S.subject].icon} ${S.subject}</h2>

    </div>
    <div class="progress-track"><div class="progress-fill" style="width:${pct}%;background:linear-gradient(90deg,${color},${color}99)"></div></div>
    ${items}
    <button id="submitBtn" class="primary-btn" style="margin-top:8px" ${answered<lessons.length?'disabled':''}>
      ${answered<lessons.length?`أجب على باقي الأسئلة (${lessons.length-answered} متبقٍ)`:'✅ إرسال الاستبيان'}
    </button>
  </div>`;
}
function bindSurvey(){
  document.getElementById('backBtn').addEventListener('click',()=>{S.step='subjects';render();});
  document.querySelectorAll('.rating-btn').forEach(btn=>{
    btn.addEventListener('click',()=>{S.ratings[btn.dataset.lesson]=btn.dataset.rating;render(false);});
  });

}
async function submitSurvey(){
  const btn=document.getElementById('submitBtn');
  if(btn){btn.disabled=true;btn.textContent='⏳ جاري الإرسال...';}
  try{
    const score=calcScore(S.ratings);
    await db.collection('responses').add({
      name:S.name,gender:S.gender,section:S.section,
      subject:S.subject,ratings:S.ratings,score,
      ts:firebase.firestore.FieldValue.serverTimestamp()
    });
    S.lastScore=score;
    markVoted(S.subject);
    S.step='done'; render();
  }catch(e){
    alert('حدث خطأ في الإرسال. تأكد من إعدادات Firebase.');
    if(btn){btn.disabled=false;btn.textContent='✅ إرسال الاستبيان';}
  }
}

async function loadResponses(){
  try{const snap=await db.collection('responses').orderBy('ts','desc').get();return snap.docs.map(d=>({id:d.id,...d.data()}));}
  catch(e){console.error(e);return[];}
}

function getFilteredStudents(subj){
  return S.responses.filter(r=>{
    if(r.subject!==subj) return false;
    if(S.filterGender!=='all'&&r.gender!==S.filterGender) return false;
    if(S.filterSection!=='all'&&r.section!==S.filterSection) return false;
    return true;
  });
}

function getStats(subj){
  const filtered=getFilteredStudents(subj);
  const lessons=SUBJECTS[subj]?.lessons||[];
  const overall={"ممتاز":0,"متوسط":0,"ضعيف":0};
  filtered.forEach(r=>lessons.forEach(l=>{if(r.ratings?.[l])overall[r.ratings[l]]++;}));
  const perLesson=lessons.map(lesson=>{
    const d={lesson,"ممتاز":0,"متوسط":0,"ضعيف":0};
    filtered.forEach(r=>{if(r.ratings?.[lesson])d[r.ratings[lesson]]++;});
    return d;
  });
  return{overall,perLesson,total:filtered.length,students:filtered};
}

function escHtml(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function escAttr(s){return String(s||'').replace(/"/g,'&quot;');}
render();
